name: Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            arch: x64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            arch: arm64
          - name: mac-x64
            os: macos-latest
            arch: x64
          - name: mac-arm64
            os: macos-latest
            arch: arm64
          - name: win-x64
            os: windows-latest
            arch: x64
          - name: win-arm64
            os: windows-11-arm
            arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Git clone repo
        if: runner.os == 'Linux' || runner.os == 'macOS'
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_PASS: ${{ secrets.GIT_PASS }}
          GIT_REPO_BASE: ${{ secrets.GIT_REPO_BASE }}
          GIT_HOST: ${{ secrets.GIT_HOST }}
        run: |
          git clone -b main "https://${GIT_USER}:${GIT_PASS}@${GIT_HOST}/${GIT_REPO_BASE}/linkandroid-pro.git" code

      - name: Git clone repo
        if: runner.os == 'Windows'
        env:
          GIT_USER: ${{ secrets.GIT_USER }}
          GIT_PASS: ${{ secrets.GIT_PASS }}
          GIT_REPO_BASE: ${{ secrets.GIT_REPO_BASE }}
          GIT_HOST: ${{ secrets.GIT_HOST }}
        shell: pwsh
        run: |
          git clone -b main "https://${env:GIT_USER}:${env:GIT_PASS}@${env:GIT_HOST}/${env:GIT_REPO_BASE}/linkandroid-pro.git" code

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Prepare (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Build Prepare (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python-setuptools

      - name: Install fpm (Linux arm64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: |
          sudo apt-get install -y ruby ruby-dev rubygems
          sudo gem install fpm
          # Replace cached x86 fpm with symlink to native arm64 system fpm
          # (electron-builder always uses cached fpm, so we override it)
          FPM_PATH=$(which fpm)
          echo "System fpm: $FPM_PATH"
          CACHE_DIR="$HOME/.cache/electron-builder/fpm/fpm-1.9.3-2.3.1-linux-x86"
          rm -rf "$CACHE_DIR"
          mkdir -p "$CACHE_DIR"
          ln -sf "$FPM_PATH" "$CACHE_DIR/fpm"

      - name: Cert Prepare (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.CORP_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.CORP_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "find-identity"
          security find-identity -p codesigning
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "" build.keychain
          echo "find-identity"
          security find-identity -v -p codesigning build.keychain
          echo "find-identity"
          security find-identity -p codesigning
          echo "set-key-partition-list"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" -t private build.keychain
          echo "export"
          security export -k build.keychain -t certs -f x509 -p -o certificate.cer
          echo "add-trusted-cert"
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain certificate.cer
          echo "find-identity"
          security find-identity -p codesigning

      - name: Install Dependencies (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        working-directory: code
        run: npm install

      - name: Configure Windows build environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "GYP_MSVS_VERSION=2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # npm_config_ prefix is npm's way to inject config values via env vars
          # (avoids 'msvs_version is not a valid npm option' error from npm config set)
          "npm_config_msvs_version=2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Visual Studio Build Tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $params = @(
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--includeRecommended"
          )
          if ($env:RUNNER_ARCH -eq 'ARM64') {
            $params += @(
              "--add", "Microsoft.VisualStudio.Component.VC.ARM64",
              "--add", "Microsoft.VisualStudio.Component.VC.Tools.ARM64"
            )
          }
          choco install visualstudio2022buildtools --params ($params -join ' ') -y

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        working-directory: code
        shell: pwsh
        run: npm install

      - name: Build Release Files
        working-directory: code
        run: npm run build
        env:
          DEBUG: "electron-notarize:*"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ARCH: ${{ matrix.arch == 'x64' && 'x64' || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Set Build Name ( Linux / macOS )
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          DIST_FILE_NAME=${{ runner.os }}-${{ runner.arch }}-v$(date +%Y%m%d_%H%M%S)-${RANDOM}
          echo ::add-mask::$DIST_FILE_NAME
          echo DIST_FILE_NAME=$DIST_FILE_NAME >> $GITHUB_ENV

      - name: Set Build Name ( Windows )
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = "${{ runner.arch }}"
          $randomNumber = Get-Random -Minimum 10000 -Maximum 99999
          $DIST_FILE_NAME = "Windows-$arch-v$(Get-Date -Format 'yyyyMMdd_HHmmss')-$randomNumber"
          Write-Host "::add-mask::$DIST_FILE_NAME"
          echo "DIST_FILE_NAME=$DIST_FILE_NAME" >> $env:GITHUB_ENV

      - name: Upload Sourcemaps
        if: runner.os == 'Linux'
        working-directory: code
        env:
          GROW_URL: ${{ secrets.GROW_URL }}
          GROW_APP_NAME: ${{ secrets.GROW_APP_NAME }}
          GROW_ADMIN_API_TOKEN: ${{ secrets.GROW_ADMIN_API_TOKEN }}
        run: |
          BUILD_ID=$(node -p "require('./dist/build.json').buildId")
          echo "Uploading sourcemaps for buildId=${BUILD_ID} ..."
          find dist dist-electron/main -name "*.map" | while read f; do
            echo "  uploading $f"
            RESP=$(curl -s -X POST "${GROW_URL}/api/admin/grow/buildUpload" \
              -H "Authorization: Bearer ${GROW_ADMIN_API_TOKEN}" \
              -F "appName=${GROW_APP_NAME}" \
              -F "buildId=${BUILD_ID}" \
              -F "file=@${f}" \
              -F "name=${f}")
            echo "  response: ${RESP}"
          done
          echo "Sourcemap upload done."

      - name: Upload Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: linkandroid-win-${{ matrix.arch }}
          path: code/dist-release/*.exe

      - name: Upload Artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: linkandroid-mac-${{ matrix.arch }}
          path: code/dist-release/*.dmg

      - name: Upload Artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linkandroid-linux-${{ matrix.arch }}
          path: |
            code/dist-release/*.AppImage
            code/dist-release/*.deb

      - name: Upload
        uses: modstart/github-oss-action@master
        with:
          title: ${{ github.event.head_commit.message }}
          key-id: ${{ secrets.OSS_2_KEY_ID }}
          key-secret: ${{ secrets.OSS_2_KEY_SECRET }}
          region: ${{ secrets.OSS_2_REGION }}
          bucket: ${{ secrets.OSS_2_BUCKET }}
          callbackTitle: ✅LinkAndroid-${{ runner.os }}-打包成功
          callback: ${{ github.event_name == 'workflow_dispatch' && secrets.REPORT_URL || secrets.REPORT_URL_ME }}
          assets: |
              code/dist-release/*.exe:apps/{random}.bin:{name}.exe
              code/dist-release/*.dmg:apps/{random}.bin:{name}.dmg
              code/dist-release/*.AppImage:apps/{random}.bin:{name}.AppImage
              code/dist-release/*.deb:apps/{random}.bin:{name}.deb

  # ── Snapshot Release (vsnapshot) ───────────────────────────────────────────────
  vsnapshot-release:
    name: Snapshot Release
    needs: [build]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          merge-multiple: false
      - name: Upload to Snapshot Release (with overwrite)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure vsnapshot release exists (create if not)
          gh release create vsnapshot \
            --title "Snapshot" \
            --notes "Latest build from main branch" \
            --prerelease \
            2>/dev/null || true
          # Copy artifacts to temp dir with version replaced by "snapshot"
          tmpdir=$(mktemp -d)
          echo "=== Downloaded artifacts ==="
          find _artifacts/ -type f -print
          echo "=== Cleaning filenames ==="
          find _artifacts/ -type f | while read f; do
            base=$(basename "$f")
            clean=$(echo "$base" | sed -E 's/[0-9]+\.[0-9]+\.[0-9]+(\.[a-zA-Z][a-zA-Z0-9]*)?/snapshot/')
            cp "$f" "$tmpdir/$clean"
            echo "Staged: $base -> $clean"
          done
          echo "=== Uploading to vsnapshot ==="
          for f in "$tmpdir"/*; do
            echo "Uploading: $(basename "$f")"
            gh release upload vsnapshot "$f" --clobber
          done
          rm -rf "$tmpdir"

  # ── Notify ────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: [build, vsnapshot-release]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Notify Webhook
        run: |
          NAME="${{ github.event.repository.name }}"
          TYPE=$(echo "${{ github.workflow }}" | tr '[:upper:]' '[:lower:]')
          VERSION=$(node -p "require('./package.json').version")
          curl -X POST "${{ secrets.HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"event\":\"${NAME}\",\"param\":{\"name\":\"${NAME}\",\"type\":\"${TYPE}\",\"version\":\"${VERSION}\"},\"data\":{\"name\":\"${NAME}\",\"type\":\"${TYPE}\",\"version\":\"${VERSION}\"}}"
